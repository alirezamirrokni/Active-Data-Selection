method: random
seed: 7
output_dir: outputs
data:
  name: math500
  hf_name: HuggingFaceH4/MATH-500
  split: test
  max_examples: 500
  batch_size: 20
main_llm:
  provider: groq
  model_name: llama-3.3-70b-versatile
  temperature: 0.0
  max_output_tokens: 1024
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5
  prompt_version: math500_answer_format_mathverify_v1
score_llm:
  provider: none
policy:
  epsilon: 0.1
  alpha_step_size: 0.1
  theta_step_size: 0.05
  initial_alpha: 0.0
  budget_per_batch: 5
  cost_variant: constant
  l2_reg: 0.0
