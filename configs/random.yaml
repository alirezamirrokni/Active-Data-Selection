method: random
seed: 7
output_dir: outputs

data:
  name: math500
  hf_name: HuggingFaceH4/MATH-500
  split: test
  batch_size: 10
  num_batches: 200

main_llm:
  provider: groq
  model_name: llama-3.3-70b-versatile
  temperature: 0.0
  max_output_tokens: 1024
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5
  prompt_version: math500_answer_format_mathverify_v1

policy:
  budget_per_batch: 5
  cost_variant: constant
