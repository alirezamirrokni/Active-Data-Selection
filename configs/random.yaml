method: random
seed: 7
output_dir: outputs
data:
  name: gsm8k
  hf_name: openai/gsm8k
  hf_config: main
  split: test
  max_examples: 200
  batch_size: 20
main_llm:
  provider: groq
  model_name: qwen/qwen3-32b
  temperature: 0.0
  max_output_tokens: 512
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5
  prompt_version: gsm8k_compact_v2
score_llm:
  provider: none
policy:
  epsilon: 0.1
  alpha_step_size: 0.1
  theta_step_size: 0.05
  initial_alpha: 0.0
  budget_per_batch: 5
  cost_variant: constant
  l2_reg: 0.0
