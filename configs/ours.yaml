method: ours
seed: 7
output_dir: outputs

data:
  name: math500
  hf_name: HuggingFaceH4/MATH-500
  split: test
  batch_size: 10
  num_batches: 200

main_llm:
  provider: groq
  model_name: llama-3.3-70b-versatile
  temperature: 0.0
  max_output_tokens: 1024
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5

score_model:
  provider: qwen3
  model_name: Qwen/Qwen3-8B
  max_length: 1024
  encode_batch_size: 4
  pooling: mean
  load_in_4bit: true
  torch_dtype: auto
  device_map: auto
  normalize_features: true
  cache_dir: null
  prompt_template: "Problem:\n\n{question}\n\nModel answer:\n\n{model_answer}"

policy:
  epsilon: 0.445
  alpha_step_size: 0.1
  theta_step_size: 0.1
  initial_alpha: 0.0
  theta_init_scale: 0.01
  warm_start_batches: 0
  budget_per_batch: 5
  cost_variant: constant
  l2_reg: 0.0