method: ours
seed: 7
output_dir: outputs
data:
  name: gsm8k
  hf_name: openai/gsm8k
  hf_config: main
  split: test
  max_examples: 200
  batch_size: 20
main_llm:
  provider: groq
  model_name: qwen/qwen3-32b
  temperature: 0.0
  max_output_tokens: 1024
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5
  prompt_version: gsm8k_answer_format_v3
score_llm:
  provider: qwen3
  model_name: Qwen/Qwen3-8B
  max_length: 1024
  encode_batch_size: 4
  pooling: mean
  load_in_4bit: true
  torch_dtype: auto
  device_map: auto
  normalize_features: true
  cache_dir: null
  prompt_template: 'Question:

    {question}


    Model answer:

    {model_answer}

    '
policy:
  epsilon: 0.1
  alpha_step_size: 0.1
  theta_step_size: 0.05
  initial_alpha: 0.0
  budget_per_batch: 5
  cost_variant: constant
  l2_reg: 0.0
