method: ours
seed: 7
output_dir: outputs
data:
  name: math500
  hf_name: HuggingFaceH4/MATH-500
  split: test
  batch_size: 10
  num_batches: 200
main_llm:
  provider: groq
  model_name: llama-3.3-70b-versatile
  temperature: 0.0
  max_output_tokens: 1024
  request_timeout: 120
  retry_attempts: 8
  retry_sleep: 2.0
  min_seconds_between_calls: 2.5
  prompt_version: math500_answer_format_mathverify_v1
score_model:
  provider: gemini_embedding_2
  model_name: gemini-embedding-2
  output_dimensionality: 768
  encode_batch_size: 8
  normalize_features: true
  min_seconds_between_calls: 0.25
  retry_attempts: 8
  retry_sleep: 2.0
  prompt_template: 'Represent this prompt-response pair for predicting whether the
    model answer will require human correction.


    Problem:

    {question}


    Model answer:

    {model_answer}'
policy:
  epsilon: 0.1
  alpha_step_size: 0.05
  theta_step_size: 0.05
  initial_alpha: 0.0
  theta_init_scale: 0.01
  warm_start_batches: 1
  budget_per_batch: 5
  cost_variant: constant
  l2_reg: 0.0
